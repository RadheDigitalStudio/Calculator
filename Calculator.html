<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/Calculator.css" media="all" />

  <title>Calculator</title>
</head>

<body>
  <div class="calculatorBox">
    <div class="calculator">
      <input type="text" id="display" disabled />
      <div class="resultBox" id="resultB">0</div>
      <div class="Box"></div>
        <div class="buttons">
          <button onclick="clearAll(); ripple(event)">C</button>
          <button onclick="backslash(); ripple(event)">Del</button>
          <button onclick="calculate('%'); ripple(event)">%</button>
          <button onclick="calculate('/'); ripple(event)">÷</button>
          
          <button onclick="calculate('7'); ripple(event)">7</button>
          <button onclick="calculate('8'); ripple(event)">8</button>
          <button onclick="calculate('9'); ripple(event)">9</button>
          <button onclick="calculate('*'); ripple(event)">×</button>
        
          <button onclick="calculate('4'); ripple(event)">4</button>
          <button onclick="calculate('5'); ripple(event)">5</button>
          <button onclick="calculate('6'); ripple(event)">6</button>
          <button onclick="addValue('+'); ripple(event)">+</button>

          <button onclick="calculate('1'); ripple(event)">1</button>
          <button onclick="calculate('2'); ripple(event)">2</button>
          <button onclick="calculate('3'); ripple(event)">3</button>
          <button onclick="calculate('+'); ripple(event)">+</button>
          
          <button onclick="calculate('0'); ripple(event)">0</button>
          <button onclick="calculate('00'); ripple(event)">00</button>
          <button onclick="calculate('.'); ripple(event)">.</button>
          <button class="equal" onclick="showResult(); ripple(event)">=</button>
        </div>
    </div>
  
  </div>
  
  
  
  
  
  
  <script src="/Calculator.js" charset="utf-8"></script>
</body>

</html>
